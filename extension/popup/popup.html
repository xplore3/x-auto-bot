<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>X Auto Bot Popup</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <div class="logo">🤖 X Auto Bot</div>
      <button id="settingsBtn" class="icon-btn" title="配置中心">⚙️</button>
    </div>
    
    <div class="status-card">
      <div class="status-indicator" id="statusIndicator"></div>
      <div class="status-text" id="statusText">已停止</div>
    </div>
    
    <div class="controls">
      <button id="toggleBtn" class="btn-main">启动自动化</button>
    </div>

    <div class="bio-section">
      <div class="section-title">👤 当前学习定位 (Bio)</div>
      <div id="bioText" class="bio-text">请先在 X 主页开启自动化以读取简介...</div>
    </div>
    
    <div class="dashboard-card">
      <div class="dash-row">
        <span>📦 库存推文</span>
        <span id="queueCount" class="highlight">0 / 20</span>
      </div>
      <div class="dash-row">
        <span>🤖 AI 生成状态</span>
        <span id="genStatus">待机</span>
      </div>
      <div class="dash-row">
        <span>⏳ 下次自动发布</span>
        <span id="nextPostTime">计算中...</span>
      </div>
    </div>

    
    <div class="log-link-row">
      <a href="../logs/logs.html" target="_blank" id="logLink">📜 查看操作记录</a>
    </div>

    <div class="stats">
      <div class="stat-item">
        <span class="stat-label">已处理推文</span>
        <span class="stat-value" id="tweetsProcessed">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">自动回复</span>
        <span class="stat-value" id="repliesSent">0</span>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
