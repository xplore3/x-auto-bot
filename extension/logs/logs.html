<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>X Voice Agent 成果记录</title>
  <link rel="icon" href="../assets/icons/icon-32.png">
  <link rel="stylesheet" href="logs.css">
</head>
<body>
  <div class="page">
    <header class="page-header">
      <div class="page-title">
        <img src="../assets/icons/icon-48.png" alt="" class="page-logo">
        <div>
          <p class="eyebrow">Result Ledger</p>
          <h1>Agent 成果记录</h1>
          <p>只展示已发布、已回复、已跳过和失败暂停等结果，过滤滚动、冷却和内部调度噪音。</p>
        </div>
      </div>
      <a href="../options/options.html" class="btn-back">返回策略中心</a>
    </header>

    <section class="stats-bar">
      <div class="stat-box">
        <span class="stat-label">成果</span>
        <strong id="totalCount">0</strong>
      </div>
      <div class="stat-box info">
        <span class="stat-label">发布</span>
        <strong id="infoCount">0</strong>
      </div>
      <div class="stat-box success">
        <span class="stat-label">回复</span>
        <strong id="successCount">0</strong>
      </div>
      <div class="stat-box warn">
        <span class="stat-label">跳过</span>
        <strong id="warnCount">0</strong>
      </div>
      <div class="stat-box error">
        <span class="stat-label">需处理</span>
        <strong id="errorCount">0</strong>
      </div>
    </section>

    <section class="toolbar">
      <div class="filter-block">
        <label>级别</label>
        <div class="filter-buttons" id="levelFilters">
          <button class="filter-btn active" data-level="all">全部</button>
          <button class="filter-btn" data-level="info">信息</button>
          <button class="filter-btn" data-level="success">成功</button>
          <button class="filter-btn" data-level="warn">警告</button>
          <button class="filter-btn" data-level="error">错误</button>
        </div>
      </div>

      <div class="filter-block">
        <label for="sourceFilter">来源</label>
        <select id="sourceFilter">
          <option value="all">全部来源</option>
          <option value="scraper">内容抓取</option>
          <option value="automator">页面操作</option>
          <option value="background">后台服务</option>
        </select>
      </div>

      <div class="toolbar-actions">
        <label class="auto-refresh">
          <input type="checkbox" id="autoRefresh" checked />
          自动刷新
        </label>
        <button id="clearBtn" class="btn-danger">清空记录</button>
      </div>
    </section>

    <section class="log-table-wrapper">
      <table class="log-table">
        <thead>
          <tr>
            <th>时间</th>
            <th>级别</th>
            <th>来源</th>
            <th>消息</th>
          </tr>
        </thead>
        <tbody id="logTableBody">
          <tr class="empty-row">
            <td colspan="4">暂无成果记录</td>
          </tr>
        </tbody>
      </table>
    </section>
  </div>
  <script src="logs.js?v=2"></script>
</body>
</html>
